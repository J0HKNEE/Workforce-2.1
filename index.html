<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Workforce — Attendance & Make-Up Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#f4f6fa; --card:#ffffff; --ink:#1a2333; --muted:#64748b; --line:#e2e8f0;
  --brand:#2563eb; --brand-ink:#ffffff; --soft:#eff4ff;
  --green:#16a34a; --red:#dc2626; --amber:#d97706; --orange:#ea580c;
  --blue:#2563eb; --indigo:#4f46e5; --teal:#0d9488; --rose:#e11d48; --purple:#7c3aed;
  --radius:12px; --shadow:0 1px 3px rgba(16,24,40,.08),0 1px 2px rgba(16,24,40,.04);
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#0f172a; --card:#1e293b; --ink:#e2e8f0; --muted:#94a3b8; --line:#334155; --soft:#1e2a4a;
         --shadow:0 1px 3px rgba(0,0,0,.4); }
}
*{box-sizing:border-box} html{-webkit-text-size-adjust:100%}
body{margin:0;font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink)}
button,input,select,textarea{font:inherit;color:inherit}
h1,h2,h3{margin:0;font-weight:650}
a{color:var(--brand)}

/* Header */
header{position:sticky;top:0;z-index:40;background:var(--card);border-bottom:1px solid var(--line);box-shadow:var(--shadow)}
.hd{display:flex;align-items:center;gap:12px;padding:10px 16px;flex-wrap:wrap}
.hd h1{font-size:18px;letter-spacing:-.01em}
.hd .logo{width:30px;height:30px;border-radius:8px;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:700;font-size:14px}
.hd .spacer{flex:1}
.sync-dot{font-size:12px;color:var(--muted)}
nav{display:flex;gap:2px;padding:0 10px;overflow-x:auto;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
nav button{background:none;border:none;border-bottom:2.5px solid transparent;padding:9px 13px;cursor:pointer;color:var(--muted);font-weight:550;white-space:nowrap;border-radius:6px 6px 0 0}
nav button:hover{color:var(--ink);background:var(--soft)}
nav button.on{color:var(--brand);border-bottom-color:var(--brand)}

/* Filter bar */
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:10px 16px;background:var(--card);border-bottom:1px solid var(--line)}
.filters select,.filters input{border:1px solid var(--line);background:var(--bg);border-radius:8px;padding:6px 9px;font-size:13.5px;max-width:170px}
.filters label{font-size:11.5px;color:var(--muted);display:block;margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.fgroup{min-width:0}
.chip-clear{border:none;background:var(--soft);color:var(--brand);border-radius:8px;padding:7px 11px;cursor:pointer;font-size:13px;font-weight:600}

/* Layout */
main{max-width:1240px;margin:0 auto;padding:16px}
.grid{display:grid;gap:12px}
.kpis{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px}
.kpi .v{font-size:26px;font-weight:700;letter-spacing:-.02em}
.kpi .l{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px}
.kpi.accent{border-left:4px solid var(--accent,var(--brand))}
.two{grid-template-columns:1fr 1fr}
@media(max-width:820px){.two{grid-template-columns:1fr}}
.card h3{font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}

/* Tables */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius)}
table{width:100%;border-collapse:collapse;font-size:14px}
th{font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);text-align:left;padding:8px 10px;border-bottom:1.5px solid var(--line);white-space:nowrap;cursor:pointer;user-select:none}
td{padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
tbody tr:hover{background:var(--soft);cursor:pointer}
tbody tr.norow:hover{background:none;cursor:default}

/* Pills & badges */
.pill{display:inline-block;padding:2px 9px;border-radius:99px;font-size:12px;font-weight:600;white-space:nowrap;color:#fff}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11.5px;font-weight:700;background:var(--soft);color:var(--brand)}
.badge.warn{background:#fef3c7;color:#92400e}.badge.bad{background:#fee2e2;color:#991b1b}.badge.ok{background:#dcfce7;color:#166534}
@media (prefers-color-scheme: dark){.badge.warn{background:#453a12;color:#fcd34d}.badge.bad{background:#4a1d1d;color:#fca5a5}.badge.ok{background:#14351f;color:#86efac}}

/* Buttons */
.btn{border:none;background:var(--brand);color:var(--brand-ink);border-radius:8px;padding:8px 14px;font-weight:600;cursor:pointer;font-size:13.5px}
.btn:hover{filter:brightness(1.08)}
.btn.ghost{background:var(--soft);color:var(--brand)}
.btn.danger{background:var(--red)}
.btn.sm{padding:4px 10px;font-size:12.5px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* Calendar */
.cal-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-dow{font-size:11px;font-weight:700;color:var(--muted);text-align:center;text-transform:uppercase;padding:4px 0}
.cal-cell{background:var(--card);border:1px solid var(--line);border-radius:10px;min-height:86px;padding:6px;cursor:pointer;transition:border-color .1s}
.cal-cell:hover{border-color:var(--brand)}
.cal-cell.dim{opacity:.42}
.cal-cell.today{border-color:var(--brand);border-width:2px}
.cal-cell .d{font-size:12.5px;font-weight:700}
.cal-mini{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.dot{width:auto;min-width:17px;height:17px;border-radius:6px;font-size:10.5px;font-weight:700;color:#fff;display:inline-grid;place-items:center;padding:0 4px}
@media(max-width:640px){.cal-cell{min-height:56px;padding:4px}.cal-mini .dot{min-width:14px;height:14px;font-size:9px}}
.cal-list .day-block{margin-bottom:14px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(10,15,30,.5);z-index:90;display:grid;place-items:center;padding:16px}
.modal{background:var(--card);border-radius:16px;max-width:640px;width:100%;max-height:88vh;overflow-y:auto;padding:20px;box-shadow:0 20px 50px rgba(0,0,0,.3)}
.modal h2{font-size:17px;margin-bottom:12px}
.mrow{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.mrow>div{flex:1;min-width:130px}
.modal label{font-size:11.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:3px}
.modal input,.modal select,.modal textarea{width:100%;border:1px solid var(--line);background:var(--bg);border-radius:8px;padding:8px 10px}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;flex-wrap:wrap}

/* Toast */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:10px;font-weight:600;z-index:99;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90vw;text-align:center}
#toast.show{opacity:1}

.muted{color:var(--muted)} .small{font-size:12.5px} .mt{margin-top:12px} .mb{margin-bottom:12px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.right{margin-left:auto}
.empty{text-align:center;color:var(--muted);padding:30px 10px}
canvas{max-height:280px}
.section-title{display:flex;align-items:center;gap:10px;margin:18px 0 10px;flex-wrap:wrap}
.section-title h2{font-size:16px}
</style>
</head>
<body>
<header>
  <div class="hd">
    <div class="logo">W</div>
    <h1>Workforce</h1>
    <span class="sync-dot" id="syncStatus"></span>
    <div class="spacer"></div>
    <button class="btn ghost sm" id="syncBtn" title="Pull latest data from your linked Excel file">&#8635; Sync</button>
    <button class="btn sm" id="adminBtn">Admin</button>
  </div>
  <nav id="nav"></nav>
</header>
<div class="filters" id="filterBar"></div>
<main id="view"></main>
<div id="modalHost"></div>
<div id="toast"></div>
<script>
"use strict";
/* ============================================================
   Workforce — single-file attendance, occurrence & make-up tool
   Data: live Microsoft Forms/Excel link (OneDrive/SharePoint),
   file import fallback, and in-app admin editing.
   ============================================================ */

/* ---------- constants ---------- */
const TYPES = {
  "Present":       {occ:0, color:"var(--green)",  abbr:"P"},
  "Absent":        {occ:1, color:"var(--red)",    abbr:"A"},
  "Tardy":         {occ:1, color:"var(--amber)",  abbr:"T"},
  "Short Shift":   {occ:1, color:"var(--orange)", abbr:"S"},
  "FMLA":          {occ:0, color:"var(--blue)",   abbr:"F"},
  "LOA":           {occ:0, color:"var(--indigo)", abbr:"L"},
  "PTO Approved":  {occ:0, color:"var(--teal)",   abbr:"PT"},
  "PTO Unapproved":{occ:1, color:"var(--rose)",   abbr:"PU"},
  "Make-Up":       {occ:0, color:"var(--purple)", abbr:"M"}
};
const TYPE_NAMES = Object.keys(TYPES);
const LADDER = [[6,"Termination Eligible","bad"],[5,"Final","bad"],[4,"Written","warn"],[3,"Verbal","warn"]];
const OSS_LIMIT = 3;              // OSS "mulligans" per rolling 12 months
const OCC_WINDOW_DAYS = 90;       // rolling window for corrective ladder
const DEFAULT_PIN = "2468";
const ORG_FIELDS = [["dept","Department"],["team","Team"],["title","Title"],["supervisor","Supervisor"],["manager","Manager"],["srManager","Senior Manager"]];
const MU_STATUS = ["Pending","Approved","Completed","Missed"];

/* ---------- state ---------- */
let S = load() || seed();
let UI = { tab:"dashboard", preset:"month", anchor:today(), from:null, to:null,
           dept:"", team:"", title:"", supervisor:"", manager:"", srManager:"", q:"",
           sortKey:"date", sortDir:-1, muFilter:"", admin: sessionStorage.getItem("wf.admin")==="1" };
let charts = [];

function load(){ try{ const s=JSON.parse(localStorage.getItem("wf.state.v1")); return s&&s.employees?s:null; }catch(e){ return null; } }
function save(){ try{ localStorage.setItem("wf.state.v1", JSON.stringify(S)); }catch(e){ toast("Could not save locally: storage full?"); } }

/* ---------- utilities ---------- */
const $  = s=>document.querySelector(s);
const esc= s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
function uid(p){ return p+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4); }
function today(){ return isoDate(new Date()); }
function isoDate(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function parseISO(s){ const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); }
function addDays(s,n){ const d=parseISO(s); d.setDate(d.getDate()+n); return isoDate(d); }
function fmt(s){ if(!s) return "—"; return parseISO(s).toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"}); }
function fmtShort(s){ return parseISO(s).toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"}); }
function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("show"); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),2800); }
async function sha(s){ const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s)); return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join(""); }

/* Date range from preset + anchor */
function range(){
  const a = UI.anchor||today(), d = parseISO(a);
  switch(UI.preset){
    case "day":     return [a,a];
    case "week": {  const dow=(d.getDay()+6)%7; const s=addDays(a,-dow); return [s, addDays(s,6)]; }
    case "month": { const s=new Date(d.getFullYear(),d.getMonth(),1), e=new Date(d.getFullYear(),d.getMonth()+1,0); return [isoDate(s),isoDate(e)]; }
    case "quarter":{const q=Math.floor(d.getMonth()/3); const s=new Date(d.getFullYear(),q*3,1), e=new Date(d.getFullYear(),q*3+3,0); return [isoDate(s),isoDate(e)]; }
    case "annual":{ return [d.getFullYear()+"-01-01", d.getFullYear()+"-12-31"]; }
    case "adjusted": return [UI.from||a, UI.to||a];
  }
  return [a,a];
}

/* ---------- filtering ---------- */
function filteredEmployees(){
  const q = UI.q.trim().toLowerCase();
  return S.employees.filter(e =>
    (!UI.dept||e.dept===UI.dept) && (!UI.team||e.team===UI.team) && (!UI.title||e.title===UI.title) &&
    (!UI.supervisor||e.supervisor===UI.supervisor) && (!UI.manager||e.manager===UI.manager) &&
    (!UI.srManager||e.srManager===UI.srManager) &&
    (!q || e.name.toLowerCase().includes(q) || e.id.toLowerCase().includes(q))
  );
}
function filteredRecords(from,to){
  const ids = new Set(filteredEmployees().map(e=>e.id));
  const [f,t] = from?[from,to]:range();
  return S.records.filter(r => ids.has(r.empId) && r.date>=f && r.date<=t);
}
function emp(id){ return S.employees.find(e=>e.id===id); }
function isOcc(r){ return !!TYPES[r.type]?.occ && !r.waived; }

/* ---------- metrics ---------- */
function occCount(empId, asOf){
  const from = addDays(asOf, -OCC_WINDOW_DAYS);
  return S.records.filter(r=>r.empId===empId && r.date>from && r.date<=asOf && isOcc(r)).length;
}
function level(n){ for(const [k,name,cls] of LADDER) if(n>=k) return {name,cls}; return null; }
function ossUsed(empId, asOf){
  const from = addDays(asOf||today(), -365);
  return S.makeups.filter(m=>m.empId===empId && m.oss && m.status!=="Missed" && m.dateMissed>=from).length;
}
function metrics(){
  const [f,t]=range(), emps=filteredEmployees(), recs=filteredRecords();
  const c = {}; TYPE_NAMES.forEach(n=>c[n]=0);
  let occ=0; recs.forEach(r=>{ c[r.type]=(c[r.type]||0)+1; if(isOcc(r)) occ++; });
  const withRec = new Set(recs.map(r=>r.empId));
  const offenders = new Set(recs.filter(isOcc).map(r=>r.empId));
  const perfect = emps.filter(e=>withRec.has(e.id) && !offenders.has(e.id));
  const empIds = new Set(emps.map(e=>e.id));
  const mus = S.makeups.filter(m=>empIds.has(m.empId) && m.dateMissed>=f && m.dateMissed<=t);
  const muDone = mus.filter(m=>m.status==="Completed").length;
  const denom = c["Present"]+c["Absent"]+c["Tardy"]+c["Short Shift"]+c["PTO Unapproved"];
  const rate = denom? Math.round(100*c["Present"]/denom) : null;
  return {c, occ, perfect, rate, mus, muDone, muPending:mus.filter(m=>m.status==="Pending").length, emps, recs, from:f, to:t};
}

/* ---------- sample data ---------- */
function seed(){
  const names=["Alex Rivera","Priya Patel","Marcus Lee","Sofia Garcia","Liam O'Brien","Yuki Tanaka","Noah Williams","Aisha Khan","Ethan Brown","Maya Singh","Carlos Mendes","Hannah Cohen","Grace Liu","Omar Haddad"];
  const org=[["Operations","Ops Alpha","Jordan Bell","Jamie Chen"],["Operations","Ops Bravo","Sam Ortiz","Jamie Chen"],["Support","Care Team 1","Casey Nguyen","Dana Kim"],["Support","Care Team 2","Robin Diaz","Dana Kim"],["Engineering","Platform","Avery Stone","Riley Park"]];
  const employees = names.map((n,i)=>{ const o=org[i%org.length]; return {
    id:"E"+String(i+1).padStart(3,"0"), name:n, dept:o[0], team:o[1], title:i%5===0?"Team Lead":"Agent",
    supervisor:o[2], manager:o[3], srManager:"Morgan Reyes", location:["HQ","Remote","West"][i%3], status:"Active" };});
  // deterministic pseudo-random records for ~10 weeks up to today
  const records=[]; let x=42; const rnd=()=>((x=(x*1103515245+12345)&0x7fffffff)/0x7fffffff);
  const end=today(), start=addDays(end,-70);
  for(let d=start; d<=end; d=addDays(d,1)){
    const day=parseISO(d).getDay(); if(day===0||day===6) continue;
    employees.forEach(e=>{
      const r=rnd(); let type="Present",hours=8,notes="";
      if(r>0.965){type="Absent";notes="Unplanned absence";}
      else if(r>0.94){type="Tardy";hours=7.5;notes="Late arrival";}
      else if(r>0.92){type="Short Shift";hours=5;notes="Left early";}
      else if(r>0.90){type="PTO Approved";notes="Vacation";}
      else if(r>0.893){type="PTO Unapproved";notes="No approval on file";}
      else if(r>0.888){type="FMLA";}
      records.push({rid:uid("r"),date:d,empId:e.id,type,hours,notes,source:"sample",waived:false});
    });
  }
  // a couple of make-up agreements over the sample data
  const makeups=[]; const cands=records.filter(r=>r.type==="Short Shift"||r.type==="Absent").slice(0,4);
  cands.forEach((r,i)=>{ const st=["Completed","Approved","Pending","Missed"][i];
    if(st==="Completed") r.waived=true;
    makeups.push({mid:uid("m"),empId:r.empId,rid:r.rid,dateMissed:r.date,hoursOwed:r.type==="Absent"?8:3,
      dueDate:addDays(r.date,14),status:st,oss:true,completedDate:st==="Completed"?addDays(r.date,7):"",notes:"Sample agreement"});});
  return { employees, records, makeups,
    settings:{ liveUrl:"", autoSync:true, pinHash:"", lastSync:"" } };
}

/* ---------- Excel import (live link + file) ---------- */
const H = s=>String(s??"").toLowerCase().replace(/[^a-z0-9]/g,"");
const EMP_MAP = {id:["employeeid","empid","agentid","workerid","id"], name:["name","employeename","agentname","fullname","employee"],
  dept:["department","dept","division"], team:["team","group","teamgroup","queue"], title:["title","jobtitle","position","role"],
  supervisor:["supervisor","sup","teamlead","lead"], manager:["manager","mgr"], srManager:["seniormanager","srmanager","srmgr","director"],
  location:["location","site","office"], status:["status","employmentstatus"]};
const REC_MAP = {date:["date","shiftdate","dateofabsence","absencedate","dateofoccurrence","starttime","completiontime"],
  empId:["employeeid","empid","agentid","id"], name:["name","employeename","agentname","employee"],
  type:["type","attendancetype","category","reason","absencetype","occurrencetype"],
  hours:["hours","hrs","duration","hoursmissed"], notes:["notes","comments","details","description"]};
function mapCols(headers, spec){
  const out={}, hs=headers.map(H);
  for(const [field,alts] of Object.entries(spec)){
    let idx=-1;
    for(const a of alts){ idx=hs.findIndex(h=>h===a); if(idx>=0) break; }
    if(idx<0) for(const a of alts){ idx=hs.findIndex(h=>h.includes(a)); if(idx>=0) break; }
    if(idx>=0) out[field]=idx;
  }
  return out;
}
function cellDate(v){
  if(v==null||v==="") return "";
  if(v instanceof Date) return isoDate(v);
  if(typeof v==="number"){ const d=XLSX.SSF.parse_date_code(v); return d? `${d.y}-${String(d.m).padStart(2,"0")}-${String(d.d).padStart(2,"0")}`:""; }
  const s=String(v).trim();
  let m=s.match(/^(\d{4})-(\d{2})-(\d{2})/); if(m) return m[0];
  m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if(m){ let y=+m[3]; if(y<100)y+=2000; return `${y}-${String(+m[1]).padStart(2,"0")}-${String(+m[2]).padStart(2,"0")}`; }
  const d=new Date(s); return isNaN(d)?"":isoDate(d);
}
function normType(v){
  const t=H(v);
  if(!t) return "";
  if(t.includes("present")||t==="p"||t.includes("ontime")) return "Present";
  if(t.includes("fmla")) return "FMLA";
  if(t.includes("loa")||t.includes("leaveofabsence")) return "LOA";
  if(t.includes("makeup")||t.includes("makup")) return "Make-Up";
  if(t.includes("pto")||t.includes("vacation")||t.includes("paidtimeoff"))
    return (t.includes("unapproved")||t.includes("unauth")||t.includes("denied"))?"PTO Unapproved":"PTO Approved";
  if(t.includes("tardy")||t.includes("late")) return "Tardy";
  if(t.includes("short")||t.includes("leaveearly")||t.includes("leftearly")||t.includes("earlyout")) return "Short Shift";
  if(t.includes("absen")||t.includes("nocallnoshow")||t.includes("ncns")||t.includes("callout")||t.includes("out")) return "Absent";
  return "";
}
function importWorkbook(wb){
  let nEmp=0, nRec=0;
  for(const sn of wb.SheetNames){
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[sn], {header:1, defval:"", cellDates:true, blankrows:false});
    if(rows.length<2) continue;
    const headers=rows[0], hs=headers.map(H);
    const isEmp = /emp|roster|staff|team(?!s)/.test(H(sn)) || (hs.some(h=>/supervisor|manager|title|department/.test(h)) && !hs.some(h=>h==="date"||h.includes("attendancedate")));
    if(isEmp){
      const M=mapCols(headers,EMP_MAP); if(M.id==null&&M.name==null) continue;
      const list=[];
      rows.slice(1).forEach(r=>{
        const id=String(r[M.id]??"").trim()||("E-"+String(r[M.name]??"").trim());
        if(!String(r[M.name]??r[M.id]??"").trim()) return;
        list.push({id, name:String(r[M.name]??id).trim(), dept:String(r[M.dept]??"").trim(), team:String(r[M.team]??"").trim(),
          title:String(r[M.title]??"").trim(), supervisor:String(r[M.supervisor]??"").trim(), manager:String(r[M.manager]??"").trim(),
          srManager:String(r[M.srManager]??"").trim(), location:String(r[M.location]??"").trim(), status:String(r[M.status]??"Active").trim()||"Active"});
      });
      if(list.length){ S.employees=list; nEmp=list.length; }
    } else {
      const M=mapCols(headers,REC_MAP); if(M.date==null||(M.empId==null&&M.name==null)) continue;
      const byName={}; S.employees.forEach(e=>byName[H(e.name)]=e.id);
      const imported=[];
      rows.slice(1).forEach(r=>{
        const date=cellDate(r[M.date]); if(!date) return;
        let empId=String(r[M.empId]??"").trim();
        if(!empId&&M.name!=null) empId=byName[H(r[M.name])]||"";
        if(!empId) return;
        const type=normType(r[M.type])|| "Absent";
        imported.push({rid:uid("r"),date,empId,type,hours:parseFloat(r[M.hours])||8,
          notes:String(r[M.notes]??"").trim(),source:"import",waived:false});
      });
      if(imported.length){
        // re-import replaces prior imported/sample rows; keeps admin-entered ("local") rows
        const keepLocal=S.records.filter(r=>r.source==="local");
        const localKeys=new Set(keepLocal.map(r=>r.date+"|"+r.empId+"|"+r.type));
        S.records=[...keepLocal, ...imported.filter(r=>!localKeys.has(r.date+"|"+r.empId+"|"+r.type))];
        // preserve waivers from completed make-ups
        S.makeups.forEach(m=>{ if(m.status==="Completed"){ const t=S.records.find(r=>r.empId===m.empId&&r.date===m.dateMissed&&TYPES[r.type].occ); if(t){t.waived=true; m.rid=t.rid;} }});
        nRec=imported.length;
      }
    }
  }
  return {nEmp,nRec};
}
function directUrl(u){
  u=u.trim();
  if(!u) return "";
  if(/download=1|\/content(\?|$)|\/download/.test(u)) return u;
  if(/1drv\.ms|sharepoint\.com|onedrive\.live\.com/.test(u)){
    const b64=btoa(u).replace(/=+$/,"").replace(/\//g,"_").replace(/\+/g,"-");
    return "https://api.onedrive.com/v1.0/shares/u!"+b64+"/root/content";
  }
  return u;
}
async function syncNow(silent){
  const url=S.settings.liveUrl;
  if(!url){ if(!silent){toast("No live link set — add one in Settings"); UI.tab="settings"; render();} return; }
  setSync("Syncing…");
  try{
    const res=await fetch(directUrl(url));
    if(!res.ok) throw new Error("HTTP "+res.status);
    const buf=await res.arrayBuffer();
    const wb=XLSX.read(buf,{cellDates:true});
    const {nEmp,nRec}=importWorkbook(wb);
    S.settings.lastSync=new Date().toLocaleString();
    save(); render();
    toast(`Synced — ${nEmp?nEmp+" employees, ":""}${nRec} records`);
  }catch(e){
    setSync("Sync failed");
    if(!silent) toast("Live sync failed ("+e.message+"). Check the link, or import the file in Settings.");
  }
  setSync("");
}
function setSync(t){ $("#syncStatus").textContent = t || (S.settings.lastSync? "Last sync: "+S.settings.lastSync : ""); }
function importFile(file){
  const rd=new FileReader();
  rd.onload=e=>{ try{
      const wb=XLSX.read(e.target.result,{cellDates:true});
      const {nEmp,nRec}=importWorkbook(wb);
      S.settings.lastSync=new Date().toLocaleString()+" (file)";
      save(); render(); toast(`Imported — ${nEmp?nEmp+" employees, ":""}${nRec} records`);
    }catch(err){ toast("Could not read that file: "+err.message); } };
  rd.readAsArrayBuffer(file);
}

function renderCalendar(){
  const [f,t]=range();
  const recs=filteredRecords(), byDate={};
  recs.forEach(r=>{(byDate[r.date]=byDate[r.date]||[]).push(r);});
  const head=`<div class="cal-head">
    <button class="btn ghost sm" id="calPrev">&#8249;</button>

    ${UI.admin?`<button class="btn sm right" id="calAdd">+ Add record</button>`:""}
  </div>`;
  if(UI.preset==="day"||UI.preset==="week"||UI.preset==="adjusted"&&addDays(f,10)>t){
    let days=[]; for(let d=f; d<=t; d=addDays(d,1)) days.push(d);
    return head+`<div class="cal-list">${days.map(d=>{
      const rs=(byDate[d]||[]).sort((a,b)=>a.type.localeCompare(b.type));
      return `<div class="day-block card"><div class="row"><b>${fmtShort(d)}</b><span class="small muted">${rs.length} record${rs.length===1?"":"s"}</span>
        ${UI.admin?`<button class="btn ghost sm right" data-add-day="${d}">+ Add</button>`:""}</div>
        ${rs.length? `<div class="tbl-wrap mt"><table><tbody>${rs.map(r=>rowRecord(r,true)).join("")}</tbody></table></div>`:`<div class="small muted mt">No records.</div>`}
      </div>`;}).join("")}</div>`;
  }
  // month/quarter/annual → month grid(s)
  const months=[]; let d=parseISO(f); d.setDate(1);
  while(isoDate(d)<=t){ months.push(new Date(d)); d.setMonth(d.getMonth()+1); }
  const dows=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  return head+months.map(m0=>{
    const y=m0.getFullYear(), mo=m0.getMonth();
    const first=new Date(y,mo,1), last=new Date(y,mo+1,0);
    const lead=(first.getDay()+6)%7;
    let cells="";
    for(let i=0;i<lead;i++) cells+=`<div></div>`;
    for(let day=1;day<=last.getDate();day++){
      const ds=isoDate(new Date(y,mo,day)), rs=byDate[ds]||[];
      const agg={}; rs.forEach(r=>agg[r.type]=(agg[r.type]||0)+1);
      const dim=ds<f||ds>t, isToday=ds===today();
      cells+=`<div class="cal-cell ${dim?"dim":""} ${isToday?"today":""}" data-day="${ds}">
        <div class="d">${day}</div>
        <div class="cal-mini">${Object.entries(agg).map(([ty,n])=>`<span class="dot" title="${esc(ty)}: ${n}" style="background:${TYPES[ty].color}">${n>1?n:TYPES[ty].abbr}</span>`).join("")}</div>
      </div>`;
    }
    return `<div class="mb"><h3 class="mt" style="font-size:15px">${m0.toLocaleDateString(undefined,{month:"long",year:"numeric"})}</h3>
      <div class="cal-grid mt">${dows.map(w=>`<div class="cal-dow">${w}</div>`).join("")}${cells}</div></div>`;
  }).join("") + `<div class="card mt"><div class="row small">${TYPE_NAMES.map(t2=>`<span class="row" style="gap:4px"><span class="dot" style="background:${TYPES[t2].color}">${TYPES[t2].abbr}</span>${t2}</span>`).join("")}</div></div>`;

function calShift(dir){
  const d=parseISO(UI.anchor);
  if(UI.preset==="day") UI.anchor=addDays(UI.anchor,dir);
  else if(UI.preset==="week") UI.anchor=addDays(UI.anchor,7*dir);
  else if(UI.preset==="month"){ d.setMonth(d.getMonth()+dir); UI.anchor=isoDate(d); }
  else if(UI.preset==="quarter"){ d.setMonth(d.getMonth()+3*dir); UI.anchor=isoDate(d); }
  else if(UI.preset==="annual"){ d.setFullYear(d.getFullYear()+dir); UI.anchor=isoDate(d); }
  else { const [f,t]=range(); const n=Math.max(1,Math.round((parseISO(t)-parseISO(f))/864e5)+1); UI.from=addDays(f,n*dir); UI.to=addDays(t,n*dir); }
  render();
}

    <p class="small">${S.employees.length} employees · ${S.records.length} records · ${S.makeups.length} make-up agreements</p>
    <div class="row mt">
      <button class="btn ghost sm" id="setBackup">Download backup (JSON)</button>
      <label class="btn ghost sm" style="display:inline-block">Restore backup<input type="file" id="setRestore" accept=".json" hidden></label>
    </div>
    <div class="row mt">
      ${UI.admin?`<button class="btn ghost sm" id="setPin">Change admin PIN</button>`:""}
      <button class="btn ghost sm" id="setSample">Load sample data</button>
      <button class="btn danger sm" id="setClear">Clear all data</button>
    </div>
    <hr style="border:none;border-top:1px solid var(--line)">
    <h3>Expected columns</h3>
    <p class="small muted"><b>Employees sheet</b> (name contains “Employees” or “Roster”): Employee ID, Name, Department, Team, Title, Supervisor, Manager, Senior Manager, Location, Status.<br>
    <b>Attendance sheet</b> (any other sheet, incl. Forms exports): Date, Employee ID (or Name), Type, Hours, Notes.
    Column names are matched flexibly — “Emp ID”, “Attendance Type”, “Comments”, etc. all work.
    Types recognized: ${TYPE_NAMES.join(", ")} (plus synonyms like “late”, “no call no show”, “vacation”).</p>
  </div></div>`;
}

/* ---------- modals ---------- */
function openModal(html){ $("#modalHost").innerHTML=`<div class="overlay" id="ovl"><div class="modal">${html}</div></div>`;
  $("#ovl").addEventListener("click",e=>{ if(e.target.id==="ovl") closeModal(); }); }
function closeModal(){ $("#modalHost").innerHTML=""; }
function empSelect(id,cur){ return `<select id="${id}">${filteredEmployees().length?filteredEmployees().map(e=>`<option ${e.id===cur?"selected":""} value="${esc(e.id)}">${esc(e.name)} (${esc(e.id)})</option>`).join(""):S.employees.map(e=>`<option ${e.id===cur?"selected":""} value="${esc(e.id)}">${esc(e.name)}</option>`).join("")}</select>`; }

function recordModal(rid,presetDate){
  const r=rid? S.records.find(x=>x.rid===rid) : {date:presetDate||today(),empId:S.employees[0]?.id,type:"Present",hours:8,notes:""};
  openModal(`<h2>${rid?"Edit":"Add"} record</h2>
    <div class="mrow"><div><label>Employee</label>${empSelect("mEmp",r.empId)}</div>
    <div><label>Date</label><input type="date" id="mDate" value="${r.date}"></div></div>
    <div class="mrow"><div><label>Type</label><select id="mType">${TYPE_NAMES.map(t=>`<option ${t===r.type?"selected":""}>${t}</option>`).join("")}</select></div>
    <div><label>Hours</label><input type="number" id="mHours" step="0.25" min="0" value="${r.hours}"></div></div>
    <div><label>Notes</label><textarea id="mNotes" rows="2">${esc(r.notes)}</textarea></div>
    <div class="mfoot">
      ${rid?"":`<span class="small muted right" style="margin-right:auto">Tip: for an occurrence type you can create a make-up agreement after saving.</span>`}
      <button class="btn ghost" onclick="closeModal()">Cancel</button>
      <button class="btn" id="mSave">Save</button></div>`);
  $("#mSave").onclick=()=>{
    const rec={rid:rid||uid("r"),date:$("#mDate").value,empId:$("#mEmp").value,type:$("#mType").value,
      hours:parseFloat($("#mHours").value)||0,notes:$("#mNotes").value.trim(),source:"local",waived:r.waived||false};
    if(!rec.date||!rec.empId) return toast("Date and employee are required");
    if(rid){ Object.assign(S.records.find(x=>x.rid===rid),rec); } else S.records.push(rec);
    save(); closeModal(); render(); toast("Record saved");
  };
}
function makeupModal(mid,fromRec){
  const m=mid? S.makeups.find(x=>x.mid===mid)
    : {empId:fromRec?.empId||S.employees[0]?.id, rid:fromRec?.rid||"", dateMissed:fromRec?.date||today(),
       hoursOwed:fromRec?(8-(fromRec.hours||0)||fromRec.hours||4):4, dueDate:addDays(today(),14), status:"Pending", oss:true, notes:""};
  const used=ossUsed(m.empId);
  openModal(`<h2>${mid?"Edit":"New"} make-up agreement</h2>
    <div class="mrow"><div><label>Employee</label>${empSelect("uEmp",m.empId)}</div>
    <div><label>Date missed</label><input type="date" id="uMissed" value="${m.dateMissed}"></div></div>
    <div class="mrow"><div><label>Hours owed</label><input type="number" id="uHours" step="0.25" min="0.25" value="${m.hoursOwed}"></div>
    <div><label>Due by</label><input type="date" id="uDue" value="${m.dueDate}"></div></div>
    <div class="mrow"><div><label>Status</label><select id="uStatus">${MU_STATUS.map(s=>`<option ${s===m.status?"selected":""}>${s}</option>`).join("")}</select></div>
    <div><label>Counts as OSS</label><select id="uOss"><option value="1" ${m.oss?"selected":""}>Yes — use an OSS</option><option value="0" ${m.oss?"":"selected"}>No</option></select>
    <div class="small muted" id="uOssNote">This employee has used ${used}/${OSS_LIMIT} OSS in the last 12 months.</div></div></div>
    <div><label>Notes</label><textarea id="uNotes" rows="2">${esc(m.notes)}</textarea></div>
    <div class="mfoot">${mid?`<button class="btn danger" id="uDel" style="margin-right:auto">Delete</button>`:""}
      <button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn" id="uSave">Save</button></div>`);
  if(mid) $("#uDel").onclick=()=>{ S.makeups=S.makeups.filter(x=>x.mid!==mid); save(); closeModal(); render(); toast("Agreement deleted"); };
  $("#uSave").onclick=()=>{
    const oss=$("#uOss").value==="1", empId=$("#uEmp").value;
    if(oss && !mid && ossUsed(empId)>=OSS_LIMIT) return toast(`OSS limit reached (${OSS_LIMIT}/12 mo) for this employee`);
    const v={mid:mid||uid("m"),empId,rid:m.rid||"",dateMissed:$("#uMissed").value,hoursOwed:parseFloat($("#uHours").value)||0,
      dueDate:$("#uDue").value,status:$("#uStatus").value,oss,completedDate:m.completedDate||"",notes:$("#uNotes").value.trim()};
    if(mid) Object.assign(S.makeups.find(x=>x.mid===mid),v); else S.makeups.push(v);
    if(v.status==="Completed") setMuStatus(v.mid,"Completed"); else { save(); render(); }
    closeModal(); toast("Agreement saved");
  };
}
function dayModal(ds){
  const ids=new Set(filteredEmployees().map(e=>e.id));
  const rs=S.records.filter(r=>r.date===ds&&ids.has(r.empId));
  openModal(`<h2>${fmtShort(ds)}</h2>
    ${rs.length?`<div class="tbl-wrap"><table><tbody>${rs.map(r=>rowRecord(r,true)).join("")}</tbody></table></div>`:`<div class="empty">No records for this day.</div>`}
    <div class="mfoot">${UI.admin?`<button class="btn" id="dAdd">+ Add record</button>`:""}<button class="btn ghost" onclick="closeModal()">Close</button></div>`);
  if(UI.admin) $("#dAdd").onclick=()=>recordModal(null,ds);
  bindRecordButtons($("#modalHost"));
}
function empModal(id){
  const e=emp(id); if(!e) return;
  const [f,t]=range();
  const rs=S.records.filter(r=>r.empId===id&&r.date>=f&&r.date<=t).sort((a,b)=>b.date.localeCompare(a.date));
  const mus=S.makeups.filter(m=>m.empId===id).sort((a,b)=>b.dateMissed.localeCompare(a.dateMissed));
  const n90=occCount(id,t), lv=level(n90);
  openModal(`<h2>${esc(e.name)} <span class="small muted">${esc(e.id)}</span></h2>
    <p class="small">${esc(e.title)} · ${esc(e.dept)} / ${esc(e.team)} · ${esc(e.location)}<br>
    Supervisor: <b>${esc(e.supervisor)}</b> · Manager: <b>${esc(e.manager)}</b> · Sr. Manager: <b>${esc(e.srManager)}</b></p>
    <p class="row small">
      <span class="badge ${lv?lv.cls:"ok"}">${lv?lv.name:"Clear"} — ${n90} occ. / 90d</span>
      <span class="badge">OSS ${ossUsed(id,t)}/${OSS_LIMIT}</span>
    </p>
    <h3 style="font-size:13px" class="mt">Records ${fmt(f)} → ${fmt(t)} (${rs.length})</h3>
    ${rs.length?`<div class="tbl-wrap"><table><tbody>${rs.map(r=>`<tr><td>${fmt(r.date)}</td><td>${pill(r.type)}${r.waived?` <span class="badge ok">waived</span>`:""}</td><td>${r.hours||""}h</td><td class="small">${esc(r.notes)}</td></tr>`).join("")}</tbody></table></div>`:`<div class="small muted">None in period.</div>`}
    <h3 style="font-size:13px" class="mt">Make-up agreements (${mus.length})</h3>
    ${mus.length?`<div class="tbl-wrap"><table><tbody>${mus.map(m=>`<tr><td>${fmt(m.dateMissed)}</td><td>${m.hoursOwed}h</td><td><span class="badge ${{Pending:"warn",Approved:"",Completed:"ok",Missed:"bad"}[m.status]}">${m.status}</span></td><td>${m.oss?"OSS":""}</td></tr>`).join("")}</tbody></table></div>`:`<div class="small muted">None.</div>`}
    <div class="mfoot">${UI.admin?`<button class="btn ghost" id="eMu">+ Make-up agreement</button>`:""}<button class="btn ghost" onclick="closeModal()">Close</button></div>`);
  if(UI.admin) $("#eMu").onclick=()=>makeupModal(null,{empId:id,date:today(),hours:0});
}
async function pinModal(change){
  openModal(`<h2>${change?"Change admin PIN":"Admin sign-in"}</h2>
    ${change?`<div class="mb"><label>New PIN</label><input id="pNew" type="password" inputmode="numeric" autocomplete="off"></div>`
    :`<p class="small muted">Enter the admin PIN to unlock editing. ${S.settings.pinHash?"":"(Default PIN: <b>"+DEFAULT_PIN+"</b> — change it in Settings.)"}</p>
      <div class="mb"><label>PIN</label><input id="pIn" type="password" inputmode="numeric" autocomplete="off"></div>`}
    <div class="mfoot"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn" id="pGo">${change?"Save PIN":"Unlock"}</button></div>`);
  const go=async()=>{
    if(change){ const v=$("#pNew").value.trim(); if(v.length<4) return toast("PIN must be at least 4 digits");
      S.settings.pinHash=await sha(v); save(); closeModal(); toast("PIN updated"); return; }
    const want=S.settings.pinHash||await sha(DEFAULT_PIN);
    if(await sha($("#pIn").value)===want){ UI.admin=true; sessionStorage.setItem("wf.admin","1"); closeModal(); render(); toast("Admin mode on"); }
    else toast("Incorrect PIN");
  };
  $("#pGo").onclick=go;
  $("#modalHost").querySelector("input").addEventListener("keydown",e=>{ if(e.key==="Enter") go(); });
  $("#modalHost").querySelector("input").focus();
}

/* ---------- render & events ---------- */
function render(){
  renderNav(); renderFilters(); setSync("");
  $("#adminBtn").textContent=UI.admin?"Admin ✓":"Admin";
  const v=$("#view");
  switch(UI.tab){
    case "dashboard": v.innerHTML=renderDashboard(); drawCharts(); break;
    case "calendar":  v.innerHTML=renderCalendar(); break;
    case "team":      v.innerHTML=renderTeam(); break;
    case "makeup":    v.innerHTML=renderMakeup(); break;
    case "records":   v.innerHTML=renderRecords(); break;
    case "settings":  v.innerHTML=renderSettings(); bindSettings(); break;
  }
  bindView();
}
function bindRecordButtons(root){
  root.querySelectorAll("[data-rec-edit]").forEach(b=>b.onclick=e=>{e.stopPropagation();recordModal(b.dataset.recEdit);});
  root.querySelectorAll("[data-rec-del]").forEach(b=>b.onclick=e=>{e.stopPropagation();
    if(confirm("Delete this record?")){ S.records=S.records.filter(r=>r.rid!==b.dataset.recDel); save(); closeModal(); render(); toast("Record deleted"); }});
}
function bindView(){
  const v=$("#view");
  v.querySelectorAll("tr[data-emp]").forEach(tr=>tr.onclick=()=>empModal(tr.dataset.emp));
  v.querySelectorAll(".cal-cell[data-day]").forEach(c=>c.onclick=()=>dayModal(c.dataset.day));
  v.querySelectorAll("[data-add-day]").forEach(b=>b.onclick=e=>{e.stopPropagation();recordModal(null,b.dataset.addDay);});
  bindRecordButtons(v);
  v.querySelectorAll("[data-mu-act]").forEach(b=>b.onclick=e=>{e.stopPropagation();
    const act=b.dataset.muAct, id=b.dataset.id;
    if(act==="edit") makeupModal(id);
    else setMuStatus(id, act==="approve"?"Approved":act==="complete"?"Completed":"Missed");});
  v.querySelectorAll("tr[data-mu]").forEach(tr=>tr.onclick=()=>{ if(UI.admin) makeupModal(tr.dataset.mu); });
  v.querySelectorAll("th[data-sort]").forEach(th=>th.onclick=()=>{
    const k=th.dataset.sort; UI.sortDir=UI.sortKey===k?-UI.sortDir:-1; UI.sortKey=k; render();});
  const on=(id,ev,fn)=>{ const el=$(id); if(el) el[ev]=fn; };
  on("#calPrev","onclick",()=>calShift(-1)); on("#calNext","onclick",()=>calShift(1));
  on("#calToday","onclick",()=>{UI.anchor=today();render();});
  on("#calAdd","onclick",()=>recordModal(null,UI.anchor));
  on("#recNew","onclick",()=>recordModal());
  on("#recExport","onclick",exportCSV);
  on("#muNew","onclick",()=>makeupModal());
  on("#muFilter","onchange",()=>{UI.muFilter=$("#muFilter").value;render();});
}
function bindSettings(){
  $("#setSave").onclick=()=>{ S.settings.liveUrl=$("#setUrl").value.trim(); S.settings.autoSync=$("#setAuto").checked; save(); syncNow(false); };
  $("#setAuto").onchange=e=>{ S.settings.autoSync=e.target.checked; save(); };
  $("#setFile").onchange=e=>{ if(e.target.files[0]) importFile(e.target.files[0]); e.target.value=""; };
  $("#setBackup").onclick=()=>{ const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([JSON.stringify(S,null,1)],{type:"application/json"}));
    a.download="workforce-backup-"+today()+".json"; a.click(); };
  $("#setRestore").onchange=e=>{ const f=e.target.files[0]; if(!f) return;
    const rd=new FileReader(); rd.onload=ev=>{ try{ const s=JSON.parse(ev.target.result);
      if(!s.employees||!s.records) throw new Error("not a workforce backup");
      S=s; S.makeups=S.makeups||[]; S.settings=S.settings||{}; save(); render(); toast("Backup restored");
    }catch(err){ toast("Restore failed: "+err.message); } }; rd.readAsText(f); e.target.value=""; };
  const pinBtn=$("#setPin"); if(pinBtn) pinBtn.onclick=()=>pinModal(true);
  $("#setSample").onclick=()=>{ if(confirm("Replace current data with sample data?")){ const st=S.settings; S=seed(); S.settings=st; save(); render(); toast("Sample data loaded"); } };
  $("#setClear").onclick=()=>{ if(confirm("Delete ALL local data? (Your Excel file is untouched.)")){
    S={employees:[],records:[],makeups:[],settings:{liveUrl:S.settings.liveUrl,autoSync:S.settings.autoSync,pinHash:S.settings.pinHash,lastSync:""}};
    save(); render(); toast("Cleared"); } };
}

/* global events */
$("#nav").addEventListener("click",e=>{ const b=e.target.closest("[data-tab]"); if(b){ UI.tab=b.dataset.tab; render(); }});
$("#filterBar").addEventListener("change",e=>{
  const t=e.target;
  if(t.id==="fPreset"){ UI.preset=t.value; if(UI.preset==="adjusted"){const [f,x]=range(); UI.from=UI.from||f; UI.to=UI.to||x;} }
  else if(t.id==="fAnchor") UI.anchor=t.value||today();
  else if(t.id==="fFrom") UI.from=t.value;
  else if(t.id==="fTo") UI.to=t.value;
  else if(t.classList.contains("ffield")) UI[t.dataset.f]=t.value;
  render();
});
$("#filterBar").addEventListener("input",e=>{ if(e.target.id==="fQ"){ UI.q=e.target.value;
  clearTimeout(window._qh); window._qh=setTimeout(render,250); }});
$("#filterBar").addEventListener("click",e=>{ if(e.target.id==="fClear"){
  Object.assign(UI,{preset:"month",anchor:today(),from:null,to:null,dept:"",team:"",title:"",supervisor:"",manager:"",srManager:"",q:""}); render(); }});
$("#adminBtn").onclick=()=>{ if(UI.admin){ UI.admin=false; sessionStorage.removeItem("wf.admin"); render(); toast("Admin mode off"); } else pinModal(false); };
$("#syncBtn").onclick=()=>syncNow(false);
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });

/* init */
render();
if(S.settings.autoSync && S.settings.liveUrl) syncNow(true);
</script>
</body>
</html>
